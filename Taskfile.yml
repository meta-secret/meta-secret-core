version: "3"

# Agent/CI entry point for Docker builds — see .ai/skills/build-via-task/SKILL.md
# Never run docker buildx bake|build directly; use: task <target>

tasks:
  default:
    cmds:
      - task -l
    silent: true

  # ============================================================
  # Docker Bake
  # ============================================================

  build:
    desc: Build and load default images (meta-server, web)
    cmds:
      - docker buildx bake --load default

  push:
    desc: Build and push default images to registry
    cmds:
      - docker buildx bake --push default

  warm-cache:
    desc: Compile test binaries and push registry cache (CI step 1)
    cmds:
      - docker buildx bake warm-cache

  test:
    desc: Compile tests, push cache, then run tests (single bake session)
    cmds:
      - docker buildx bake test-ci

  warm-cache-wasm:
    desc: Pre-compile WASM deps only, push to registry cache
    cmds:
      - docker buildx bake warm-cache-wasm

  web-local:
    desc: Build web dist (WASM compile + web in one bake session)
    cmds:
      - docker buildx bake web-preview

  wasm-local:
    desc: Build WASM pkg (chef cook + pkg in one bake session)
    cmds:
      - docker buildx bake wasm-pkg

  meta-server:
    desc: Build and load meta-server image
    cmds:
      - docker buildx bake --load meta-server-image

  web:
    desc: Build and load web image
    cmds:
      - docker buildx bake --load web-image

  playwright-test:
    desc: Run Playwright smoke tests in Docker (set PLAYWRIGHT_BASE_URL)
    env:
      PLAYWRIGHT_BASE_URL: '{{.PLAYWRIGHT_BASE_URL}}'
    cmds:
      - docker buildx bake playwright --load
      - docker run --rm -e PLAYWRIGHT_BASE_URL={{.PLAYWRIGHT_BASE_URL}} ghcr.io/meta-secret/meta-secret-core/playwright:latest

  generate-recipe:
    desc: Regenerate meta-secret/recipe.json via cargo-chef
    cmds:
      - docker buildx bake generate-recipe

  web-run:
    desc: Build web image and run dev server on :5173
    cmds:
      - task: web
      - docker run --rm -p 5173:5173 cypherkitty/meta-secret-web:latest bun run dev -- --host 0.0.0.0

  taskomatic:
    desc: Build and load taskomatic image
    cmds:
      - docker buildx bake --load taskomatic

  taskomatic-run:
    desc: Build and run taskomatic container
    cmds:
      - task: taskomatic
      - docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $HOME/.kube:/root/.kube
          -v $HOME/.config/k3d:/root/.config/k3d
          --name taskomatic
          --workdir /taskomatic
          localhost/taskomatic:latest

  sops:
    desc: Build and load sops image
    cmds:
      - docker buildx bake --load sops

  # ============================================================
  # Local dev
  # ============================================================

  wasm-test:
    desc: Run WASM tests in Firefox
    dir: meta-secret/wasm
    cmds:
      - wasm-pack test --firefox

  wasm-test-headless:
    desc: Run WASM tests headless in Firefox
    dir: meta-secret/wasm
    cmds:
      - wasm-pack test --headless --firefox
