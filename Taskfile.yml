version: "3"

# Agent/CI entry point for Docker builds — see .ai/skills/build-via-task/SKILL.md
# Never run docker buildx bake|build directly; use: task <target>

tasks:
  default:
    cmds:
      - task -l
    silent: true

  # ============================================================
  # Docker Bake
  # ============================================================

  build:
    desc: Build and load default images (meta-server, web)
    cmds:
      - docker buildx bake --load default

  push:
    desc: Build and push default images to registry
    cmds:
      - docker buildx bake --push default

  warm-cache:
    desc: Build and push builder-debug:cache deps image (CI)
    cmds:
      - task: bake-push
        vars:
          TARGET: builder-debug-cache

  test-run:
    desc: Run tests (after builder-debug-cache, or bake test-ci)
    cmds:
      - docker buildx bake test

  test:
    desc: Push deps image, compile and run tests (one bake; --push in CI)
    cmds:
      - task: bake-push
        vars:
          TARGET: test-ci

  warm-cache-wasm:
    desc: Build and push builder-wasm:cache deps image (CI)
    cmds:
      - task: bake-push
        vars:
          TARGET: builder-wasm-cache

  web-build-local:
    desc: Build web dist only (prefer task web-local / bake web-preview)
    cmds:
      - docker buildx bake web-local

  web-local:
    desc: Push wasm deps image, build web dist (one bake; --push in CI)
    cmds:
      - task: bake-push
        vars:
          TARGET: web-preview

  wasm-local:
    desc: Push wasm deps image, extract pkg (one bake; --push in CI)
    cmds:
      - task: bake-push
        vars:
          TARGET: wasm-pkg

  bake-push:
    internal: true
    vars:
      TARGET: '{{.TARGET}}'
    cmds:
      - |
        if [ -n "${PUSH_CACHE:-}" ]; then
          docker buildx bake --push {{.TARGET}}
        else
          docker buildx bake {{.TARGET}}
        fi

  meta-server:
    desc: Build and load meta-server image
    cmds:
      - docker buildx bake --load meta-server-image

  web:
    desc: Build and load web image
    cmds:
      - docker buildx bake --load web-image

  playwright-test:
    desc: Run Playwright smoke tests in Docker (set PLAYWRIGHT_BASE_URL)
    env:
      PLAYWRIGHT_BASE_URL: '{{.PLAYWRIGHT_BASE_URL}}'
    cmds:
      - docker buildx bake playwright --load
      - docker run --rm --network host -e PLAYWRIGHT_BASE_URL={{.PLAYWRIGHT_BASE_URL}} ghcr.io/meta-secret/meta-secret-core/playwright:latest

  generate-recipe:
    desc: Regenerate meta-secret/recipe.json via cargo-chef
    cmds:
      - docker buildx bake generate-recipe

  web-run:
    desc: Build web image and run dev server on :5173
    cmds:
      - task: web
      - docker run --rm -p 5173:5173 cypherkitty/meta-secret-web:latest bun run dev -- --host 0.0.0.0

  taskomatic:
    desc: Build and load taskomatic image
    cmds:
      - docker buildx bake --load taskomatic

  taskomatic-run:
    desc: Build and run taskomatic container
    cmds:
      - task: taskomatic
      - docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          -v $HOME/.kube:/root/.kube
          -v $HOME/.config/k3d:/root/.config/k3d
          --name taskomatic
          --workdir /taskomatic
          localhost/taskomatic:latest

  sops:
    desc: Build and load sops image
    cmds:
      - docker buildx bake --load sops

  # ============================================================
  # Local dev
  # ============================================================

  wasm-test:
    desc: Run WASM tests in Firefox
    dir: meta-secret/wasm
    cmds:
      - wasm-pack test --firefox

  wasm-test-headless:
    desc: Run WASM tests headless in Firefox
    dir: meta-secret/wasm
    cmds:
      - wasm-pack test --headless --firefox
