name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_message:
        description: 'Deployment message'
        required: false
        default: 'Manual deployment'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web UI
        run: task web-local

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.META_SECRET_GH_PAT }}
          external_repository: meta-secret/meta-secret.github.io
          publish_branch: main
          publish_dir: meta-secret/web-cli/ui/dist
          commit_message: ${{ github.event.inputs.deploy_message }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy web-cli (cloudflare pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy meta-secret/web-cli/ui/dist --project-name=id0
