# Builds the web-cli, deploys a PR preview to Cloudflare Pages, then runs
# Playwright smoke tests against the live preview URL.
#
# Preview URL pattern: https://pr-<number>.id0.pages.dev
# Each PR gets its own isolated deployment; Cloudflare cleans them up automatically.

name: PR Preview

on:
  pull_request:

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      pull-requests: write

    env:
      PUSH_CACHE: 1

    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web-cli
        run: task web-local

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy PR preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy meta-secret/web-cli/ui/dist \
            --project-name=id0 \
            --branch="pr-${{ github.event.number }}"
          echo "deployment-url=https://pr-${{ github.event.number }}.id0.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          body="### Preview deployed

          ${PREVIEW_URL}"
          existing="$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("### Preview deployed")) | .id' | head -1)"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" -f body="$body"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
          fi

  playwright:
    needs: deploy-preview
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: task playwright-test
