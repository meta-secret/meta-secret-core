# Builds and pushes production Docker images on push to main (and on manual trigger).
# Uses docker buildx bake (see docker-bake.hcl) to produce:
#   - cypherkitty/meta-secret-server:latest
#   - cypherkitty/meta-secret-web:latest
# Also writes layer cache back to the registry for faster subsequent builds.

name: "Docker Images"

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker_push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      FORCE_COLOR: 1
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: task push
