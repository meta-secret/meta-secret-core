# PR CI: Rust tests (Docker), web preview deploy (Cloudflare), Playwright smoke tests.
#
# Preview URL pattern: https://pr-<number>.id0.pages.dev
# One workflow + one concurrency group → new push cancels the entire previous pipeline.
#
# Wall-clock: max(test, deploy-preview).
# test || deploy-preview in parallel (one VM for web build + deploy + Playwright).
# Deps images builder-debug:cache / builder-wasm:cache — separate tags, safe in parallel.

name: CI

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read
      packages: write

    env:
      FORCE_COLOR: 1
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: task test

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read
      packages: write
      pull-requests: write

    env:
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web-cli
        run: task web-local

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy preview and run Playwright (parallel)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cd meta-secret/web-cli/ui
          bunx serve dist -l 4173 >/tmp/serve.log 2>&1 &
          SERVE_PID=$!
          trap 'kill "$SERVE_PID" 2>/dev/null || true' EXIT

          bunx wrangler pages deploy dist \
            --project-name=id0 \
            --branch="pr-${{ github.event.pull_request.number }}" &
          DEPLOY_PID=$!

          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4173 task playwright-test

          wait "$DEPLOY_PID"
          echo "deployment-url=https://pr-${{ github.event.pull_request.number }}.id0.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run .github/scripts/comment-preview-url.ts
