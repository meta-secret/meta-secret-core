# PR CI: Rust tests (Docker), web preview deploy (Cloudflare), Playwright smoke tests.
#
# Preview URL pattern: https://pr-<number>.id0.pages.dev
# One workflow + one concurrency group → new push cancels the entire previous pipeline.

name: CI

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  warm-cache:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Warm host test dependency cache
        run: task warm-cache

  test:
    needs: warm-cache
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      FORCE_COLOR: 1
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: task test

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      pull-requests: write

    env:
      PUSH_CACHE: 1

    outputs:
      preview-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web-cli
        run: task web-local

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy PR preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy meta-secret/web-cli/ui/dist \
            --project-name=id0 \
            --branch="pr-${{ github.event.pull_request.number }}"
          echo "deployment-url=https://pr-${{ github.event.pull_request.number }}.id0.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run .github/scripts/comment-preview-url.ts

  playwright:
    if: github.event_name == 'pull_request'
    needs: deploy-preview
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      PUSH_CACHE: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.preview-url }}
        run: task playwright-test
